# docker-compose.yml (No version)
services:
  backend:
    build:
      context: ./enviro365-withdrawal-system-backend
      dockerfile: Dockerfile
    container_name: enviro365-backend
    ports:
      - "8080:8080"
    environment:
      - SERVER_PORT=8080
      - DB_URL=jdbc:h2:mem:enviro365db
      - DB_USERNAME=enviro_database
      - DB_PASSWORD=enviro365_secure_password_2024
      - CORS_ORIGINS=http://localhost:3000,http://localhost:3001
      - CSV_EXPORT_DIR=./exports
      - CSV_MAX_SIZE=10MB
    volumes:
      - ./exports:/app/exports
      - ./logs:/app/logs
    networks:
      - enviro365-network

  frontend:
    build:
      context: ./enviro365-withdrawal-system-frontend
      dockerfile: Dockerfile
    container_name: enviro365-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    environment:
      - REACT_APP_API_URL=http://backend:8080/api/v1
    networks:
      - enviro365-network

networks:
  enviro365-network:
    driver: bridge